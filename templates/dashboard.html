{% extends "layout.html" %}
{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">Clinic Dashboard</h2>
        <button class="btn btn-primary shadow" data-bs-toggle="modal" data-bs-target="#enrollModal">Enroll New Patient</button>
    </div>

    <div class="table-responsive bg-white p-3 rounded shadow-sm border">
        <table class="table table-hover align-middle">
            <thead class="table-light"><tr><th>UID</th><th>Full Name</th><th>Actions</th></tr></thead>
            <tbody>
                {% for p in patients %}
                <tr>
                    <td class="fw-bold text-primary small">{{ p.patient_uid }}</td>
                    <td>{{ p.full_name }}</td>
                    <td>
                        <div class="btn-group">
                            <a href="{{ url_for('view_patient', id=p.id) }}" class="btn btn-sm btn-outline-info">View & Edit</a>
                            <a href="{{ url_for('delete_patient', id=p.id) }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete this record?')">Delete</a>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

<div class="modal fade" id="enrollModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <form action="/add_patient" method="POST" enctype="multipart/form-data" class="modal-content">
            <div class="modal-header bg-primary text-white"><h5>New Patient EHR Enrollment</h5></div>
            <div class="modal-body row g-3">
                <div class="col-md-6"><label>Name</label><input type="text" name="full_name" class="form-control" required></div>
                <div class="col-md-3"><label>Weight (kg)</label><input type="number" step="0.1" name="weight" class="form-control"></div>
                <div class="col-md-3"><label>Blood Type</label><input type="text" name="blood_type" class="form-control"></div>
                
                <div class="col-md-6"><label class="d-block mb-1">Gender</label><input type="radio" name="gender" value="Male" checked> Male <input type="radio" name="gender" value="Female"> Female</div>
                <div class="col-md-3"><label>Date of Birth</label><input type="date" name="dob" class="form-control"></div>
                
                <div class="col-md-3">
                    <label>Last Checkup</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                        <input type="text" id="last-checkup-add" name="last_visit" class="form-control bg-white" placeholder="Select Date..." readonly>
                    </div>
                </div>
                
                <div class="col-12"><div class="form-check"><input type="checkbox" name="immunization" class="form-check-input"><label>Immunization Up-to-Date</label></div></div>
                <div class="col-12"><label>Medical History</label><textarea name="notes" class="form-control" rows="3"></textarea></div>
                <div class="col-12"><label>Radiology Images (Multi-select)</label><input type="file" name="radiology_scan" class="form-control" multiple accept="image/*"></div>
            </div>
            <div class="modal-footer"><button type="submit" class="btn btn-primary px-4 fw-bold">Generate Record</button></div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        flatpickr("#last-checkup-add", { dateFormat: "Y-m-d", allowInput: false });
    });
</script>
{% endblock %}
