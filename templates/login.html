{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <h3 class="text-center mb-4 text-primary">Secure Access</h3>
                
                {% if error %}
                <div class="alert alert-danger text-center">{{ error }}</div>
                {% endif %}
                
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">Login to Dashboard</button>
                    
                    <div class="text-center">
                        <a href="/forgot_password" class="text-decoration-none small text-muted">Forgot password?</a>
                        <hr>
                        <p class="mb-0 small">Need an account? <a href="/register" class="text-decoration-none">Register here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
