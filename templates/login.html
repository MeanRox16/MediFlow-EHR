{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow border-0 p-4">
            <h3 class="text-center text-primary fw-bold mb-4">Doctor Login</h3>
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for message in messages %}<div class="alert alert-success">{{ message }}</div>{% endfor %}
              {% endif %}
            {% endwith %}
            <form method="POST">
                <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Sign In</button>
            </form>
            <div class="mt-3 text-center">
                <a href="/forgot_password" class="small text-decoration-none">Forgot Password?</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
