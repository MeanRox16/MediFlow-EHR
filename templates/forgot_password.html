{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 p-4">
            <h4 class="text-center text-primary fw-bold">Reset Password</h4>
            {% if success %}
                <div class="alert alert-success text-center">A reset link has been sent to your clinical email.</div>
                <a href="/login" class="btn btn-primary w-100">Back to Login</a>
            {% else %}
                <form method="POST">
                    <p class="small text-muted text-center">Enter your registered email address.</p>
                    <input type="email" name="email" class="form-control mb-3" required>
                    <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                </form>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
