{% extends "layout.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-0 p-4">
            <h3 class="text-center text-primary fw-bold mb-4">Doctor Registration</h3>
            {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
            <form method="POST">
                <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
                <input type="email" name="email" class="form-control mb-3" placeholder="Clinical Email" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
                <div class="form-text text-muted mb-3 small">
                    Must be 8+ characters, containing at least 1 uppercase letter, 1 number, and 1 special character.
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold">Create Account</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
